<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRent CI - API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c7ff5 0%, #9d8ff7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #f5f5f5;
            border-radius: 30px;
            padding: 80px 100px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
            text-align: center;
        }

        .icon {
            font-size: 6em;
            margin-bottom: 30px;
        }

        h1 {
            color: #5b7ff5;
            font-size: 3.5em;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .status {
            display: inline-block;
            background: #10d97d;
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚗</div>
        <h1>CarRent CI API</h1>
        <div class="status">✓ API Opérationnelle</div>
    </div>
</body>
</html>
